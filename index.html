<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazar Karademir</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0c0e;
    --surface: #111318;
    --border: rgba(255,255,255,0.08);
    --text-primary: #f0ede8;
    --text-muted: rgba(240,237,232,0.45);
    --accent: #c8a97e;
    --accent-dim: rgba(200,169,126,0.15);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    position: relative;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,126,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,126,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(200,169,126,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(200,169,126,0.3);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3rem, 8vw, 4.5rem);
    line-height: 1.05;
    color: var(--text-primary);
    animation: fadeUp 0.6s 0.1s ease both;
    margin-bottom: 0.4rem;
  }

  .name em {
    font-style: italic;
    color: var(--accent);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 1.8rem auto;
    opacity: 0.5;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .desc {
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    line-height: 1.8;
    animation: fadeUp 0.6s 0.3s ease both;
    margin-bottom: 3.5rem;
  }

  .links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 22px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.02em;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .link-btn:hover {
    border-color: rgba(200,169,126,0.5);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .link-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: currentColor;
  }

  .footer {
    position: absolute;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(240,237,232,0.2);
    animation: fadeUp 0.6s 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<div class="container">
  <div class="tag">
    <span class="dot"></span>
    Çok yakında
  </div>

  <h1 class="name">Hazar<br><em>Karademir</em></h1>

  <div class="divider"></div>

  <p class="desc">Kişisel web sitesi yapım aşamasında.<br>Yakında burada olacak.</p>

  <div class="links">

  </div>
</div>

</body>
</html>
