<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Turnuva Yöneticisi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff3d00;
    --gold: #ffd700;
    --text: #e8e8f0;
    --muted: #666680;
    --green: #00c853;
    --red: #ff1744;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,61,0,0.07) 0%, transparent 50%);
  }
  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin: 16px auto 0;
    border-radius: 2px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

  /* SETUP SCREEN */
  #setup-screen { display: block; }
  #tournament-screen { display: none; }

  .setup-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    max-width: 560px;
    margin: 40px auto;
    position: relative;
    overflow: hidden;
  }
  .setup-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  input[type=number], input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    padding: 12px 16px;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--accent); }

  .format-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .format-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 20px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--text);
  }
  .format-btn:hover { border-color: var(--accent); }
  .format-btn.active { border-color: var(--accent); background: rgba(0,229,255,0.08); }
  .format-btn .fmt-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .format-btn .fmt-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--accent); }
  .format-btn .fmt-desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .player-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .player-input-wrap { position: relative; }
  .player-num {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 0.75rem; color: var(--accent); font-weight: 700;
  }
  .player-inputs input { padding-left: 32px; font-size: 0.95rem; }

  .btn {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    padding: 14px 32px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }
  .btn-danger {
    background: linear-gradient(135deg, var(--accent2), #cc2000);
    color: #fff;
    box-shadow: none;
  }
  .btn-danger:hover { box-shadow: 0 8px 24px rgba(255,61,0,0.3); }
  .btn-sm {
    width: auto;
    padding: 8px 20px;
    font-size: 1rem;
    margin-top: 0;
  }

  /* TOURNAMENT SCREEN */
  .tournament-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  .t-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--accent); }
  .t-meta { color: var(--muted); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }

  /* TABS */
  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    padding: 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--card); color: var(--accent); border: 1px solid var(--border); }

  /* MATCHES */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .match-card:hover { border-color: rgba(0,229,255,0.3); }
  .match-card.played { border-color: rgba(0,200,83,0.3); background: rgba(0,200,83,0.04); }
  .match-player { font-size: 1.1rem; font-weight: 700; }
  .match-player.home { text-align: right; }
  .match-player.away { text-align: left; }
  .match-score-area { display: flex; align-items: center; gap: 8px; justify-content: center; }
  .score-input {
    width: 44px;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    padding: 6px 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: var(--accent); }
  .score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--muted); }
  .save-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-left: 4px;
  }
  .save-btn:hover { opacity: 0.85; }
  .match-round { font-size: 0.75rem; color: var(--muted); text-align: center; letter-spacing: 1px; text-transform: uppercase; }

  /* STANDINGS */
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table th:first-child { text-align: left; }
  .standings-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid rgba(42,42,58,0.5); font-size: 1rem; }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:last-child td { border-bottom: none; }
  .rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; margin-right: 8px; }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #b0b0c0; }
  .rank-3 .rank-num { color: #cd7f32; }
  .pts-badge {
    display: inline-block;
    background: rgba(0,229,255,0.12);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    min-width: 36px;
  }
  .standings-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .stat-td { color: var(--muted); font-size: 0.95rem; }

  /* BRACKET */
  .bracket-wrap { overflow-x: auto; padding-bottom: 12px; }
  .bracket {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    padding: 20px 10px;
    min-width: max-content;
  }
  .bracket-round { display: flex; flex-direction: column; gap: 0; }
  .bracket-round-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .bracket-matches { display: flex; flex-direction: column; }
  .bracket-match-wrap { display: flex; flex-direction: column; justify-content: center; }
  .bracket-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: 200px;
    transition: border-color 0.2s;
    margin: 8px 0;
  }
  .bracket-match:hover { border-color: rgba(0,229,255,0.3); }
  .bracket-team {
    padding: 9px 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.95rem;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-team.winner { background: rgba(0,229,255,0.1); color: var(--accent); }
  .bracket-team.loser { opacity: 0.45; }
  .bracket-team .bscore {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .bracket-team.tbd { color: var(--muted); font-style: italic; }

  /* Connector lines via ::after */
  .connector { width: 20px; border-top: 1px solid var(--border); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--accent2);
    border-radius: 14px;
    padding: 36px 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent2); margin-bottom: 10px; }
  .modal p { color: var(--muted); font-size: 1rem; margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 12px; }
  .modal-btns .btn { margin-top: 0; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1.5px;
    padding: 12px 28px;
    border-radius: 40px;
    z-index: 200;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media(max-width: 600px) {
    .match-player { font-size: 0.9rem; }
    .setup-box { padding: 24px 18px; }
    .player-inputs { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <header>
    <h1>⚽ FIFA Turnuva</h1>
    <div class="subtitle">Akşama Katil Herkes</div>
  </header>
  <div class="container">
    <div class="setup-box">
      <div class="setup-title">🎯 Turnuva Kur</div>
      
      <div class="form-group">
        <label>Format Seç</label>
        <div class="format-picker">
          <div class="format-btn active" onclick="selectFormat('league', this)">
            <span class="fmt-icon">📊</span>
            <div class="fmt-name">Lig Usulü</div>
            <div class="fmt-desc">Herkes herkesle, puan tablosu</div>
          </div>
          <div class="format-btn" onclick="selectFormat('knockout', this)">
            <span class="fmt-icon">⚡</span>
            <div class="fmt-name">Eleme</div>
            <div class="fmt-desc">Kaybet, git — turnuva kupası</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Oyuncu Sayısı</label>
        <input type="number" id="player-count" min="2" max="16" value="4" oninput="renderPlayerInputs()" />
      </div>

      <div class="form-group">
        <label>Oyuncu İsimleri</label>
        <div class="player-inputs" id="player-inputs"></div>
      </div>

      <button class="btn" onclick="startTournament()">🎲 Kura Çek & Başlat</button>
    </div>
  </div>
</div>

<!-- TOURNAMENT SCREEN -->
<div id="tournament-screen">
  <header>
    <h1>⚽ FIFA Turnuva</h1>
    <div class="subtitle" id="t-subtitle">Lig Usulü · 4 Oyuncu</div>
  </header>
  <div class="container">
    <div class="tournament-header">
      <div>
        <div class="t-title" id="t-format-label">LİG</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="confirmReset()">🔄 Sıfırla</button>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="tab-content"></div>
  </div>
</div>

<!-- RESET MODAL -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>⚠️ Emin misin?</h3>
    <p>Tüm skorlar, fikstür ve puan tablosu sıfırlanacak. Bu işlem geri alınamaz!</p>
    <div class="modal-btns">
      <button class="btn" style="background:var(--surface);color:var(--text);border:1px solid var(--border);" onclick="closeModal()">İptal</button>
      <button class="btn btn-danger" onclick="doReset()">Sıfırla</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Skor Kaydedildi</div>

<script>
// ---- STATE ----
let state = {
  format: 'league',
  players: [],
  matches: [],     // {id, home, away, homeScore, awayScore, played, round, roundName}
  activeTab: 0
};

// ---- SETUP ----
function selectFormat(f, el) {
  state.format = f;
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function renderPlayerInputs() {
  const n = parseInt(document.getElementById('player-count').value) || 4;
  const wrap = document.getElementById('player-inputs');
  const existing = [...wrap.querySelectorAll('input')].map(i => i.value);
  wrap.innerHTML = '';
  const defaultNames = ['Ali','Mehmet','Emre','Can','Burak','Sercan','Murat','Okan','Tolga','Bora','Alp','Cem','Doruk','Efe','Gökhan','Hakan'];
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'player-input-wrap';
    d.innerHTML = `<span class="player-num">${i+1}</span><input type="text" placeholder="${defaultNames[i] || 'Oyuncu '+(i+1)}" value="${existing[i] || ''}"/>`;
    wrap.appendChild(d);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startTournament() {
  const n = parseInt(document.getElementById('player-count').value) || 4;
  const inputs = document.querySelectorAll('#player-inputs input');
  const defaultNames = ['Ali','Mehmet','Emre','Can','Burak','Sercan','Murat','Okan','Tolga','Bora','Alp','Cem','Doruk','Efe','Gökhan','Hakan'];
  state.players = [];
  for (let i=0; i<n; i++) {
    const v = inputs[i]?.value.trim();
    state.players.push(v || defaultNames[i] || `Oyuncu ${i+1}`);
  }
  state.players = shuffle(state.players);

  if (state.format === 'league') generateLeagueFixture();
  else generateKnockoutFixture();

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('tournament-screen').style.display = 'block';
  document.getElementById('t-subtitle').textContent = (state.format==='league'?'Lig Usulü':'Eleme Usulü') + ' · ' + n + ' Oyuncu';
  document.getElementById('t-format-label').textContent = state.format==='league' ? 'LİG' : 'ELİMİNASYON';
  renderTabs();
}

// ---- LEAGUE ----
function generateLeagueFixture() {
  const p = state.players;
  state.matches = [];
  let id = 0;
  let roundNum = 1;
  const n = p.length;
  const teams = n%2===0 ? [...p] : [...p, 'BYE'];
  const nt = teams.length;
  const rounds = nt - 1;
  for (let r=0; r<rounds; r++) {
    const roundMatches = [];
    for (let i=0; i<nt/2; i++) {
      const h = teams[i], a = teams[nt-1-i];
      if (h!=='BYE' && a!=='BYE') {
        roundMatches.push({id: id++, home: h, away: a, homeScore: '', awayScore: '', played: false, round: roundNum, roundName: `Hafta ${roundNum}`});
      }
    }
    state.matches.push(...roundMatches);
    teams.splice(1,0,teams.pop());
    roundNum++;
  }
}

// ---- KNOCKOUT ----
function generateKnockoutFixture() {
  const p = [...state.players];
  let size = 1;
  while (size < p.length) size *= 2;
  while (p.length < size) p.push('BYE');
  state.matches = [];
  state.knockoutRounds = [];
  let id = 0;
  const roundNames = ['Final','Yarı Final','Çeyrek Final','Son 16','Son 32'];

  const totalRounds = Math.log2(size);
  const getRoundName = (r) => {
    const remaining = totalRounds - r;
    if (remaining === 1) return 'Final';
    if (remaining === 2) return 'Yarı Final';
    if (remaining === 3) return 'Çeyrek Final';
    return `Tur ${r+1}`;
  };

  let currentTeams = p;
  for (let r=0; r<totalRounds; r++) {
    const roundMatches = [];
    for (let i=0; i<currentTeams.length; i+=2) {
      const h = currentTeams[i], a = currentTeams[i+1];
      const match = {id: id++, home: h, away: a, homeScore: '', awayScore: '', played: false, round: r, roundName: getRoundName(r), knockoutRoundIndex: r};
      roundMatches.push(match);
      state.matches.push(match);
    }
    state.knockoutRounds = state.knockoutRounds || [];
    state.knockoutRounds[r] = roundMatches;
    currentTeams = roundMatches.map(() => '?');
  }
}

// ---- TABS ----
function renderTabs() {
  const tabs = document.getElementById('tabs');
  if (state.format === 'league') {
    tabs.innerHTML = `
      <button class="tab active" onclick="switchTab(0,this)">📅 Fikstür</button>
      <button class="tab" onclick="switchTab(1,this)">📊 Puan Tablosu</button>`;
  } else {
    tabs.innerHTML = `
      <button class="tab active" onclick="switchTab(0,this)">📅 Fikstür</button>
      <button class="tab" onclick="switchTab(1,this)">🏆 Eleme Ağacı</button>`;
  }
  state.activeTab = 0;
  renderTabContent();
}

function switchTab(idx, el) {
  state.activeTab = idx;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTabContent();
}

function renderTabContent() {
  if (state.activeTab === 0) renderFixture();
  else if (state.format === 'league') renderStandings();
  else renderBracket();
}

// ---- FIXTURE ----
function renderFixture() {
  const rounds = [...new Set(state.matches.map(m => m.roundName))];
  let html = '';
  rounds.forEach(rn => {
    html += `<div class="section-title">${rn}</div>`;
    state.matches.filter(m => m.roundName === rn).forEach(m => {
      if (m.home === 'BYE' || m.away === 'BYE') return;
      const played = m.played ? 'played' : '';
      const hVal = m.homeScore !== '' ? m.homeScore : '';
      const aVal = m.awayScore !== '' ? m.awayScore : '';
      html += `
      <div class="match-card ${played}" id="match-${m.id}">
        <div class="match-player home">${m.home}</div>
        <div class="match-score-area">
          <input class="score-input" type="number" min="0" max="99" value="${hVal}" placeholder="-" id="hs-${m.id}" ${m.played?'readonly':''}/>
          <span class="score-sep">:</span>
          <input class="score-input" type="number" min="0" max="99" value="${aVal}" placeholder="-" id="as-${m.id}" ${m.played?'readonly':''}/>
          ${!m.played ? `<button class="save-btn" onclick="saveScore(${m.id})">✓</button>` : `<button class="save-btn" style="background:#555;color:#aaa" onclick="editScore(${m.id})">✏</button>`}
        </div>
        <div class="match-player away">${m.away}</div>
      </div>`;
    });
  });
  document.getElementById('tab-content').innerHTML = html;
}

function saveScore(id) {
  const m = state.matches.find(x => x.id === id);
  const hs = document.getElementById(`hs-${id}`).value;
  const as = document.getElementById(`as-${id}`).value;
  if (hs === '' || as === '') { showToast('Lütfen iki skoru da gir!', '#ff3d00'); return; }
  m.homeScore = parseInt(hs);
  m.awayScore = parseInt(as);
  m.played = true;
  if (state.format === 'knockout') advanceKnockout(m);
  renderFixture();
  showToast('✓ Skor kaydedildi!', 'var(--green)');
}

function editScore(id) {
  const m = state.matches.find(x => x.id === id);
  m.played = false;
  renderFixture();
}

function advanceKnockout(m) {
  const r = m.knockoutRoundIndex;
  const nextR = r + 1;
  if (nextR >= state.knockoutRounds.length) return;
  const winner = m.homeScore > m.awayScore ? m.home : (m.awayScore > m.homeScore ? m.away : m.home + '/Beraberlik');
  const roundMatches = state.knockoutRounds[r];
  const matchIdx = roundMatches.findIndex(x => x.id === m.id);
  const nextMatchIdx = Math.floor(matchIdx / 2);
  const nextMatch = state.knockoutRounds[nextR][nextMatchIdx];
  if (!nextMatch) return;
  if (matchIdx % 2 === 0) nextMatch.home = winner;
  else nextMatch.away = winner;
}

// ---- STANDINGS ----
function renderStandings() {
  const players = state.players;
  const table = {};
  players.forEach(p => { table[p] = {p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  state.matches.filter(m => m.played && m.home !== 'BYE' && m.away !== 'BYE').forEach(m => {
    const h = table[m.home], a = table[m.away];
    h.p++; a.p++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;
    if (m.homeScore > m.awayScore) { h.w++; h.pts+=3; a.l++; }
    else if (m.homeScore < m.awayScore) { a.w++; a.pts+=3; h.l++; }
    else { h.d++; h.pts++; a.d++; a.pts++; }
  });
  const sorted = players.slice().sort((a,b) => {
    const ta = table[a], tb = table[b];
    if (tb.pts !== ta.pts) return tb.pts - ta.pts;
    const avgA = ta.gf - ta.ga, avgB = tb.gf - tb.ga;
    return avgB - avgA;
  });
  let rows = '';
  sorted.forEach((p,i) => {
    const t = table[p];
    const cls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    rows += `<tr class="${cls}">
      <td><span class="rank-num">${i+1}</span>${p}</td>
      <td class="stat-td">${t.p}</td>
      <td>${t.w}</td>
      <td class="stat-td">${t.d}</td>
      <td class="stat-td">${t.l}</td>
      <td class="stat-td">${t.gf}</td>
      <td class="stat-td">${t.ga}</td>
      <td class="stat-td">${t.gf-t.ga}</td>
      <td><span class="pts-badge">${t.pts}</span></td>
    </tr>`;
  });
  document.getElementById('tab-content').innerHTML = `
    <div class="standings-wrap">
      <table class="standings-table">
        <thead><tr>
          <th>Oyuncu</th><th title="Oynadı">O</th><th title="Galibiyet">G</th><th title="Beraberlik">B</th><th title="Mağlubiyet">M</th><th title="Attığı Gol">AG</th><th title="Yediği Gol">YG</th><th title="Averaj">AV</th><th>PTS</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ---- BRACKET ----
function renderBracket() {
  if (!state.knockoutRounds) { document.getElementById('tab-content').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px;">Eleme ağacı yükleniyor...</p>'; return; }
  let html = '<div class="bracket-wrap"><div class="bracket">';
  const totalRounds = state.knockoutRounds.length;
  state.knockoutRounds.forEach((rMatches, ri) => {
    const matchesInRound = rMatches.length;
    const totalH = matchesInRound * 80 + (matchesInRound - 1) * 32;
    html += `<div class="bracket-round">
      <div class="bracket-round-title">${rMatches[0]?.roundName || 'Tur '+(ri+1)}</div>
      <div class="bracket-matches">`;
    rMatches.forEach(m => {
      const hWin = m.played && m.homeScore > m.awayScore;
      const aWin = m.played && m.awayScore > m.homeScore;
      const hCls = m.played ? (hWin ? 'winner' : 'loser') : (m.home==='?' ? 'tbd' : '');
      const aCls = m.played ? (aWin ? 'winner' : 'loser') : (m.away==='?' ? 'tbd' : '');
      const hScore = m.played ? `<span class="bscore">${m.homeScore}</span>` : '';
      const aScore = m.played ? `<span class="bscore">${m.awayScore}</span>` : '';
      const hName = m.home === 'BYE' || m.home === '?' ? 'TBD' : m.home;
      const aName = m.away === 'BYE' || m.away === '?' ? 'TBD' : m.away;
      html += `<div class="bracket-match-wrap">
        <div class="bracket-match">
          <div class="bracket-team ${hCls}">${hName}${hScore}</div>
          <div class="bracket-team ${aCls}">${aName}${aScore}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  // Winner
  const finalMatch = state.knockoutRounds[totalRounds-1]?.[0];
  if (finalMatch && finalMatch.played) {
    const champion = finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home : finalMatch.away;
    html += `<div class="bracket-round">
      <div class="bracket-round-title" style="color:var(--gold)">🏆 Şampiyon</div>
      <div class="bracket-matches">
        <div class="bracket-match-wrap">
          <div class="bracket-match" style="border-color:var(--gold);background:rgba(255,215,0,0.08)">
            <div class="bracket-team winner" style="color:var(--gold);font-size:1.1rem;justify-content:center">${champion}</div>
          </div>
        </div>
      </div></div>`;
  }
  html += '</div></div>';
  document.getElementById('tab-content').innerHTML = html;
}

// ---- RESET ----
function confirmReset() {
  document.getElementById('reset-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('reset-modal').classList.remove('show');
}
function doReset() {
  closeModal();
  state = { format: 'league', players: [], matches: [], activeTab: 0 };
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('tournament-screen').style.display = 'none';
  document.querySelector('.format-btn').classList.add('active');
  document.querySelectorAll('.format-btn')[1].classList.remove('active');
  renderPlayerInputs();
}

// ---- TOAST ----
function showToast(msg, color='var(--green)') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = color === 'var(--green)' ? '#000' : '#fff';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
renderPlayerInputs();
</script>
</body>
</html>
