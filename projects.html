<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeler · Hazar Karademir</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0c0e;
    --surface: #111318;
    --surface2: #16181f;
    --border: rgba(255,255,255,0.07);
    --text-primary: #f0ede8;
    --text-muted: rgba(240,237,232,0.42);
    --accent: #c8a97e;
    --accent-dim: rgba(200,169,126,0.12);
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text-primary); overflow-x: hidden; }
  body { font-family: 'DM Mono', monospace; }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(200,169,126,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,126,0.035) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    background: rgba(11,12,14,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem; color: var(--text-primary);
    text-decoration: none;
  }
  .nav-logo em { color: var(--accent); font-style: italic; }

  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a {
    text-decoration: none; font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  .page-header {
    position: relative; z-index: 1;
    padding: 10rem 2rem 4rem;
    max-width: 900px; margin: 0 auto;
  }

  .page-label {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    margin-bottom: 1rem;
    animation: fadeUp 0.5s 0.08s ease both;
  }

  .page-title em { color: var(--accent); font-style: italic; }

  .page-desc {
    font-size: 13px; color: var(--text-muted);
    line-height: 1.8; max-width: 500px;
    animation: fadeUp 0.5s 0.16s ease both;
  }

  /* FILTER TAGS */
  .filter-bar {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 0 2rem 2.5rem;
    display: flex; gap: 0.6rem; flex-wrap: wrap;
    animation: fadeUp 0.5s 0.22s ease both;
  }

  .filter-btn {
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 100px;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--accent);
    border-color: rgba(200,169,126,0.4);
    background: var(--accent-dim);
  }

  /* PROJECTS GRID */
  .projects-container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem;
    display: flex; flex-direction: column;
    gap: 1rem;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    animation: fadeUp 0.4s ease both;
    cursor: default;
  }

  .project-card:hover {
    border-color: rgba(200,169,126,0.3);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .project-card.featured {
    border-color: rgba(200,169,126,0.2);
  }

  .project-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 1rem;
  }

  .featured-badge {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(200,169,126,0.3);
    padding: 3px 9px; border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .project-date {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .project-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem; color: var(--text-primary);
    line-height: 1.2;
  }

  .project-desc {
    font-size: 12.5px; color: var(--text-muted);
    line-height: 1.75; flex: 1;
  }

  .project-tags {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
  }

  .tag {
    font-size: 11px; letter-spacing: 0.04em;
    color: rgba(200,169,126,0.7);
    background: rgba(200,169,126,0.08);
    padding: 3px 10px; border-radius: 4px;
  }

  .project-footer {
    display: flex; align-items: center;
    justify-content: flex-end;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .github-link {
    display: inline-flex; align-items: center; gap: 7px;
    text-decoration: none;
    font-size: 12px; color: var(--text-muted);
    transition: color 0.2s;
  }

  .github-link:hover { color: var(--accent); }
  .github-link svg { width: 15px; height: 15px; fill: currentColor; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 5rem 2rem;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 0.6rem; }
  .empty-desc { font-size: 12.5px; color: var(--text-muted); }

  /* COUNT */
  .projects-count {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 0 2rem 1.5rem;
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.04em;
    animation: fadeUp 0.5s 0.28s ease both;
  }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 2rem;
    border-top: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.1em;
    color: rgba(240,237,232,0.18);
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }

  @media (max-width: 600px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<nav>
  <a href="index.html" class="nav-logo">Hazar <em>Karademir</em></a>
  <div class="nav-links">
    <a href="index.html">Ana Sayfa</a>
    <a href="projects.html" class="active">Projeler</a>
  </div>
</nav>

<div class="page-header">
  <p class="page-label">// Çalışmalarım</p>
  <h1 class="page-title">Projeler &amp; <em>Deneyimler</em></h1>
  <p class="page-desc">Öğrendikçe ürettiklerim. Her proje bir öğrenme adımı.</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">Tümü</button>
</div>

<div class="projects-count" id="projectsCount"></div>

<div class="projects-container">
  <div class="projects-grid" id="projectsGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📂</div>
    <div class="empty-title">Proje bulunamadı</div>
    <div class="empty-desc">Bu kategoride henüz proje yok.</div>
  </div>
</div>

<footer>© 2025 Hazar Karademir · Antalya Bilim Üniversitesi</footer>

<script>
  let allProjects = [];
  let activeFilter = 'all';

  async function loadProjects() {
    try {
      const res = await fetch('projects.json?t=' + Date.now());
      allProjects = await res.json();
      buildFilters();
      renderProjects();
    } catch(e) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('emptyState').querySelector('.empty-desc').textContent = 'Projeler yüklenirken bir hata oluştu.';
    }
  }

  function buildFilters() {
    const tags = new Set();
    allProjects.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
    const bar = document.getElementById('filterBar');
    tags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = tag;
      btn.textContent = tag;
      btn.onclick = () => setFilter(tag, btn);
      bar.appendChild(btn);
    });
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProjects();
  }

  document.querySelector('[data-filter="all"]').onclick = function() {
    setFilter('all', this);
  };

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long' });
  }

  function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('projectsCount');

    const filtered = activeFilter === 'all'
      ? allProjects
      : allProjects.filter(p => (p.tags || []).includes(activeFilter));

    // Sort: featured first, then by date desc
    filtered.sort((a, b) => {
      if (a.featured && !b.featured) return -1;
      if (!a.featured && b.featured) return 1;
      return new Date(b.date) - new Date(a.date);
    });

    grid.innerHTML = '';

    if (filtered.length === 0) {
      empty.classList.add('visible');
      count.textContent = '';
      return;
    }

    empty.classList.remove('visible');
    count.textContent = `${filtered.length} proje listeleniyor`;

    filtered.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'project-card' + (p.featured ? ' featured' : '');
      card.style.animationDelay = (i * 0.06) + 's';

      card.innerHTML = `
        <div class="project-top">
          <span class="project-date">${formatDate(p.date)}</span>
          ${p.featured ? '<span class="featured-badge">Öne Çıkan</span>' : ''}
        </div>
        <div class="project-title">${escHtml(p.title)}</div>
        <div class="project-desc">${escHtml(p.description)}</div>
        ${p.tags && p.tags.length ? `<div class="project-tags">${p.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
        ${p.github ? `
        <div class="project-footer">
          <a class="github-link" href="${escHtml(p.github)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub'da Gör
          </a>
        </div>` : ''}
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadProjects();
</script>
</body>
</html>
